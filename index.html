<style>
body {
  margin:0;
  font-family: Arial;
  transition:0.3s;
}

/* HOME */
#home {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  transition:0.3s;
}

.grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:20px;
}

.card {
  width:140px;
  height:140px;
  background:white;
  border-radius:20px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:18px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  transition:0.3s;
}

.card:hover {
  transform: scale(1.05);
}

/* PAGES */
.page {
  display:none;
  padding:20px;
  background:#f4f6fb;
  min-height:100vh;
  transition:0.3s;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  background:#1976d2;
  color:white;
  cursor:pointer;
  border-radius:5px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

li {
  list-style:none;
  background:#e3f2fd;
  margin:5px 0;
  padding:10px;
  cursor:pointer;
  border-radius:5px;
}

.favorite { background:#c8e6c9; }
.learned { text-decoration: line-through; }

/* DARK MODE */
body.dark {
  background:#121212;
  color: black;
}

body.dark .page, body.dark li, body.dark button, body.dark input {
  background:#1e1e1e;
  color: white;
}
</style>
</head>

let favorites = new Set();
let learned = new Set();
const list = document.getElementById("list");

/* RENDER VOCAB */
function render(arr){
  list.innerHTML="";
  arr.forEach((w,i)=>{
    const li=document.createElement("li");
    let icon="";
    if(favorites.has(w)) icon+="⭐ ";
    if(learned.has(w)) icon+="✔ ";
    li.textContent = (i+1)+". "+icon+w;
    li.onclick=()=>{ favorites.has(w)?favorites.delete(w):favorites.add(w); render(arr); }
    li.ondblclick=()=>{ learned.add(w); updateProgress(); render(arr); }

    list.appendChild(li);
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
  const q=this.value.toLowerCase();
  render(words.filter(w=>w.toLowerCase().includes(q)));
});

/* VOCAB FUNCTIONS */
function showAll(){ render(words); }
function showFavorites(){ render([...favorites]); }
function randomWord(){
  const r=words[Math.floor(Math.random()*words.length)];
  document.getElementById("random").textContent=r;
}
function quiz(){
  const w=words[Math.floor(Math.random()*words.length)];
  const word=w.split(" – ")[0];
  const answer=w.split(" — ")[1];
  const user=prompt("Meaning of: "+word);
  if(user && answer.toLowerCase().includes(user.toLowerCase())){
    alert("✅ Correct!");
  } else {
    alert("❌ Answer: "+answer);
  }
}

function updateProgress(){
  document.getElementById("progress").textContent = "Learned: "+learned.size+" / "+words.length;
}

render(words);
