  .flower-garden {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  height: 100vh;
  cursor: pointer;
  flex-wrap: wrap;
}

.flower {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  transition: background-color 0.5s ease, transform 0.3s ease;
  animation: bloom 0.5s ease forwards;
}

.flower:hover {
  transform: scale(1.3) rotate(15deg);
}

/* Barglar animatsiyasiga o‘xshash “blossom” effekt */
@keyframes bloom {

  50% { transform: scale(1.2); opacity: 1; }

}
body {

  margin:0;
  padding:20px;

}

.container {

  padding:20px;
  border-radius:10px;

}

h1 { text-align:center; }

input {
  width:100%;
  padding:10px;
  margin-bottom:10px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:5px;
  background:#1976d2;
  color:white;
  cursor:pointer;
}

button:hover { background:#125ea7; }

li {
  list-style:none;
  background:#e3f2fd;
  margin:5px 0;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

.favorite { background:#c8e6c9; }
.learned { text-decoration:line-through; }

.dark {
  background:#121212;
  color:white;
}
.dark .container { background:#1e1e1e; }
.dark li { background:#333; }

const list = document.getElementById('list');
let favorites = new Set();
let learned = new Set();

function render(arr){
  list.innerHTML = '';
  arr.forEach((w, index)=>{
    const li = document.createElement('li');
    let icons = "";
    if(favorites.has(w)) icons += "⭐ ";
    if(learned.has(w)) icons += "✔ ";
    li.innerHTML = `<b>${index + 1}.</b> ${icons}${w}`;

    li.onclick = () => {
      favorites.has(w) ? favorites.delete(w) : favorites.add(w);
      render(arr);
    };
    li.ondblclick = () => {
      learned.add(w);
      updateProgress();
      render(arr);
    };
    list.appendChild(li);
  });
}

render(words);

document.getElementById('search').addEventListener('input', function(){
  const q = this.value.toLowerCase();
  render(words.filter(w => w.toLowerCase().includes(q)));
});

function showFavorites(){
  render([...favorites]);
}

function showAll(){
  render(words);
}

function randomWord(){
  const r = words[Math.floor(Math.random()*words.length)];
  document.getElementById('random').textContent = "👉 " + r;
}

function startQuiz(){
  const w = words[Math.floor(Math.random()*words.length)];
  const word = w.split(" – ")[0];
  const answer = w.split(" – ")[1];
  const user = prompt(`Meaning of: ${word}`);
  if(user && answer.toLowerCase().includes(user.toLowerCase())){
    alert("✅ Correct!");
  } else {
    alert("❌ Answer: " + answer);
  }
}

function updateProgress(){
  document.getElementById('progress').textContent =
    "Learned: " + learned.size + " / " + words.length;
}

function toggleDark(){
  document.body.classList.toggle('dark');
}
