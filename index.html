const list = document.getElementById('list');
let favorites = new Set();
let learned = new Set();

function render(arr){
  list.innerHTML = '';
  arr.forEach((w, index)=>{
    const li = document.createElement('li');
    let icons = "";
    if(favorites.has(w)) icons += "⭐ ";
    if(learned.has(w)) icons += "✔ ";
    li.innerHTML = `<b>${index + 1}.</b> ${icons}${w}`;

    li.onclick = () => {
      favorites.has(w) ? favorites.delete(w) : favorites.add(w);
      render(arr);
    };
    li.ondblclick = () => {
      learned.add(w);
      updateProgress();
      render(arr);
    };
    list.appendChild(li);
  });
}

render(words);

document.getElementById('search').addEventListener('input', function(){
  const q = this.value.toLowerCase();
  render(words.filter(w => w.toLowerCase().includes(q)));
});

function showFavorites(){
  render([...favorites]);
}

function showAll(){
  render(words);
}

function randomWord(){
  const r = words[Math.floor(Math.random()*words.length)];
  document.getElementById('random').textContent = "👉 " + r;
}

function startQuiz(){
  const w = words[Math.floor(Math.random()*words.length)];
  const word = w.split(" – ")[0];
  const answer = w.split(" – ")[1];
  const user = prompt(`Meaning of: ${word}`);
  if(user && answer.toLowerCase().includes(user.toLowerCase())){
    alert("✅ Correct!");
  } else {
    alert("❌ Answer: " + answer);
  }
}

function updateProgress(){
  document.getElementById('progress').textContent =
    "Learned: " + learned.size + " / " + words.length;
}

function toggleDark(){
  document.body.classList.toggle('dark');
}
